<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Quick Memo</title>
    <link rel="stylesheet" href="/static/vendor/quill.snow.css">
    <link rel="stylesheet" href="/static/css/quill-override.css">
    <link rel="stylesheet" href="/static/css/editor.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar (under the native title bar) -->
        <div class="toolbar-row">
            <div class="toolbar-actions">
                <button class="tb-btn" onclick="openManagement()" title="Open management page">Memos</button>
                <button class="tb-btn" id="pin-btn" onclick="togglePin()" title="Toggle always-on-top">Pin</button>
                <button class="tb-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme"></button>
            </div>
        </div>

        <div id="editor"></div>

        <div id="meta-bar">
            <select id="category-select">
                <option value="">No category</option>
            </select>
            <div id="tags-input-wrap">
                <div id="tags-chips"></div>
                <input type="text" id="tags-input" placeholder="Tags (space to add)">
            </div>
        </div>

        <div id="status-bar">
            <span id="toast"></span>
            <span class="shortcut-hint">Ctrl+Enter</span>
            <button id="save-btn" onclick="saveMemo()">Save</button>
        </div>
    </div>
    <script src="/static/vendor/quill.min.js"></script>
    <script src="/static/js/toolbar-options.js"></script>
    <script src="/static/js/editor.js"></script>
</body>
</html>
